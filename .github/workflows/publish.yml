name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag matches package versions
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          pyproject_version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          cargo_version="$(python - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as f:
              print(tomllib.load(f)["package"]["version"])
          PY
          )"

          if [[ "${tag}" != v* ]]; then
            echo "Tag must start with v, got: ${tag}" >&2
            exit 1
          fi

          if [[ "${version}" != "${pyproject_version}" ]]; then
            echo "Tag version ${version} does not match pyproject.toml version ${pyproject_version}" >&2
            exit 1
          fi

          if [[ "${version}" != "${cargo_version}" ]]; then
            echo "Tag version ${version} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build-wheels:
    needs: validate-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-version: "3.10"
            manylinux: "2014"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-version: "3.11"
            manylinux: "2014"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-version: "3.12"
            manylinux: "2014"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-version: "3.13"
            manylinux: "2014"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-version: "3.10"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-version: "3.11"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-version: "3.12"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-version: "3.13"
          - os: macos-15-intel
            target: x86_64-apple-darwin
            python-version: "3.10"
          - os: macos-15-intel
            target: x86_64-apple-darwin
            python-version: "3.11"
          - os: macos-15-intel
            target: x86_64-apple-darwin
            python-version: "3.12"
          - os: macos-15-intel
            target: x86_64-apple-darwin
            python-version: "3.13"
          - os: macos-15
            target: aarch64-apple-darwin
            python-version: "3.10"
          - os: macos-15
            target: aarch64-apple-darwin
            python-version: "3.11"
          - os: macos-15
            target: aarch64-apple-darwin
            python-version: "3.12"
          - os: macos-15
            target: aarch64-apple-darwin
            python-version: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Linux wheels
        if: startsWith(matrix.os, 'ubuntu-')
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          maturin-version: "1.12.6"
          args: >-
            --release
            --out dist
            --compatibility pypi
            -i python${{ matrix.python-version }}

      - name: Build non-Linux wheels
        if: ${{ !startsWith(matrix.os, 'ubuntu-') }}
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          maturin-version: "1.12.6"
          args: >-
            --release
            --out dist
            -i python

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist/*

  build-sdist:
    needs: validate-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin==1.12.6"

      - name: Build source distribution
        run: python -m maturin sdist --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  publish:
    needs:
      - validate-release
      - build-wheels
      - build-sdist
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
